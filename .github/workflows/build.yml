name: Build

on:
  push:
    paths-ignore:
      - README.md
      - docs/**
      - LICENSE
      - .github/ISSUE_TEMPLATE/**
  pull_request:
    paths-ignore:
      - README.md
      - docs/**
      - LICENSE
      - .github/ISSUE_TEMPLATE/**

permissions:
  actions: read
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_core:
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
    env:
      TOOLSCREEN_BUILD_DIR: 'out/build-ci'
      TOOLSCREEN_ARTIFACT_DIR: 'out/build-ci/bin/Release'
      TOOLSCREEN_PACKAGING_BUILD_DIR: 'out/build-ci-package'
      TOOLSCREEN_PACKAGING_ARTIFACT_DIR: 'out/build-ci-package/bin/Release'
      TOOLSCREEN_RELEASE_DIR: 'out/release-unsigned'
      VCPKG_DEFAULT_BINARY_CACHE: '${{ github.workspace }}/.cache/vcpkg/archives'
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/.cache/vcpkg/archives,readwrite'
      VCPKG_DISABLE_METRICS: '1'
      SCCACHE_GHA_ENABLED: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore CMake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TOOLSCREEN_BUILD_DIR }}/_deps
            ${{ env.TOOLSCREEN_BUILD_DIR }}/downloads
          key: windows-build-deps-v3-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'src/vcpkg.json') }}
          restore-keys: |
            windows-build-deps-v3-

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: windows-vcpkg-binary-v1-${{ hashFiles('src/vcpkg.json') }}
          restore-keys: |
            windows-vcpkg-binary-v1-

      - name: Restore prebuilt liblogger cache
        id: prebuilt_liblogger_cache
        uses: actions/cache@v4
        with:
          path: out/prebuilt-liblogger
          key: windows-prebuilt-liblogger-v1-${{ hashFiles('liblogger/LibLoggerVersion.cmake', 'scripts/fetch_signed_liblogger.ps1') }}
          restore-keys: |
            windows-prebuilt-liblogger-v1-

      - name: Fetch latest signed liblogger artifacts
        if: ${{ steps.prebuilt_liblogger_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $destination = Join-Path (Get-Location) 'out/prebuilt-liblogger'
          & .\scripts\fetch_signed_liblogger.ps1 -DestinationDirectory $destination

      - name: Configure core build preset
        shell: pwsh
        run: |
          $prebuiltLoggerDllPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.dll').Path

          cmake --preset ci-ninja-x64 -DTOOLSCREEN_ENABLE_JAR_PACKAGING=OFF -DTOOLSCREEN_ENABLE_EXE_PACKAGING=OFF -DTOOLSCREEN_BUILD_DOWNLOADER_ARTIFACTS=OFF -DTOOLSCREEN_STAGE_LIBLOGGER_PDB=OFF -DTOOLSCREEN_PREBUILT_LIBLOGGER_DLL_PATH="$prebuiltLoggerDllPath"

      - name: Build DLLs and GUI integration test runner
        shell: pwsh
        run: cmake --build --preset ci-release --parallel --target Toolscreen toolscreen_gui_integration_tests toolscreen_interactive_create_tests toolscreen_game_state_source_tests toolscreen_path_sanitize_tests

      - name: Run fast CTest smoke tests
        shell: pwsh
        run: ctest --preset ci-release --exclude-regex "^toolscreen_integration_"

      - name: Run GUI integration tests in parallel
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\$env:TOOLSCREEN_ARTIFACT_DIR\toolscreen_gui_integration_tests.exe" --run-groups-parallel

      - name: Set up Java 17
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore Maven repository cache
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: windows-maven-v2-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            windows-maven-v2-

      - name: Configure packaging build preset
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: |
          $toolscreenDllPath = (Resolve-Path "$env:TOOLSCREEN_ARTIFACT_DIR/Toolscreen.dll").Path
          $libloggerDllPath = (Resolve-Path "$env:TOOLSCREEN_ARTIFACT_DIR/liblogger_x64.dll").Path

          cmake --preset ci-ninja-x64-packaging -DTOOLSCREEN_ENABLE_EXE_PACKAGING=OFF -DTOOLSCREEN_BUILD_DOWNLOADER_ARTIFACTS=OFF -DTOOLSCREEN_STAGE_LIBLOGGER_PDB=OFF -DTOOLSCREEN_PACKAGING_DLL_PATH="$toolscreenDllPath" -DTOOLSCREEN_PACKAGING_LIBLOGGER_PATH="$libloggerDllPath"

      - name: Build JAR package
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: cmake --build --preset ci-package --parallel --target jar

      - name: Assemble unsigned release inputs
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_RELEASE_DIR
          $coreDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $jarDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_PACKAGING_ARTIFACT_DIR

          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          Copy-Item -Path (Join-Path $coreDir 'Toolscreen.dll') -Destination (Join-Path $releaseDir 'Toolscreen.dll') -Force
          Copy-Item -Path (Join-Path $coreDir 'Toolscreen.pdb') -Destination (Join-Path $releaseDir 'Toolscreen.pdb') -Force
          Copy-Item -Path (Join-Path $coreDir 'liblogger_x64.dll') -Destination (Join-Path $releaseDir 'liblogger_x64.dll') -Force

          $jarPath = Get-ChildItem -Path $jarDir -File -Filter 'Toolscreen-*-double-click-me.jar' | Select-Object -First 1 -ExpandProperty FullName
          if (-not $jarPath) {
            throw "Expected packaged Toolscreen jar in $jarDir"
          }

          Copy-Item -Path $jarPath -Destination (Join-Path $releaseDir (Split-Path $jarPath -Leaf)) -Force

      - name: Strip private symbols from unsigned PDB
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_RELEASE_DIR
          $pdbPath = Join-Path $artifactDir 'Toolscreen.pdb'

          if (-not (Test-Path $pdbPath)) {
            throw "Expected unsigned Toolscreen PDB not found: $pdbPath"
          }

          $pdbCopyCommand = Get-Command pdbcopy.exe -ErrorAction SilentlyContinue
          $pdbCopyPath = if ($pdbCopyCommand) {
            $pdbCopyCommand.Path
          } else {
            Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits" -Recurse -Filter pdbcopy.exe -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $pdbCopyPath) {
            Write-Warning 'pdbcopy.exe not found; keeping the full Toolscreen.pdb for this unsigned build.'
            return
          }

          $temporaryDirectory = Join-Path $env:RUNNER_TEMP 'toolscreen-pdbcopy'
          $strippedPdbPath = Join-Path $temporaryDirectory 'Toolscreen.pdb'
          New-Item -ItemType Directory -Force -Path $temporaryDirectory | Out-Null
          Remove-Item -Path $strippedPdbPath -Force -ErrorAction SilentlyContinue

          $beforeSizeBytes = (Get-Item $pdbPath).Length
          & $pdbCopyPath $pdbPath $strippedPdbPath -p

          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $strippedPdbPath)) {
            throw "Failed to strip private symbols from $pdbPath using $pdbCopyPath"
          }

          Remove-Item -Path $pdbPath -Force
          Move-Item -Path $strippedPdbPath -Destination $pdbPath

          $afterSizeBytes = (Get-Item $pdbPath).Length
          Write-Host ('Reduced Toolscreen.pdb from {0} MiB to {1} MiB using PDBCopy.' -f [math]::Round($beforeSizeBytes / 1MB, 2), [math]::Round($afterSizeBytes / 1MB, 2))

      - name: Validate unsigned PE metadata
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE 'scripts\verify_unsigned_pe_metadata.ps1'
          $artifactDirectory = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_RELEASE_DIR
          & $scriptPath -ArtifactDirectory $artifactDirectory

      - name: Rename release artifacts
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_RELEASE_DIR
          $suffix = '-not-legal-for-speedruns'

          function Get-SingleArtifactPath {
            param(
              [string]$Pattern,
              [string]$Label
            )

            $matches = Get-ChildItem $outputDir -File -Filter $Pattern

            if ($matches.Count -ne 1) {
              throw "Expected exactly one $Label matching '$Pattern' in $outputDir, found $($matches.Count)"
            }

            return $matches[0].FullName
          }

          $filesToRename = @(
            Join-Path $outputDir 'Toolscreen.dll'
            Join-Path $outputDir 'Toolscreen.pdb'
            Join-Path $outputDir 'liblogger_x64.dll'
            Get-SingleArtifactPath 'Toolscreen-*-double-click-me.jar' 'main installer jar'
          )

          foreach ($filePath in $filesToRename) {
            if (-not (Test-Path $filePath)) {
              throw "Expected artifact not found: $filePath"
            }

            $item = Get-Item $filePath
            $renamed = '{0}{1}{2}' -f $item.BaseName, $suffix, $item.Extension
            Move-Item -Path $item.FullName -Destination (Join-Path $item.DirectoryName $renamed)
          }

      - name: Upload unsigned release artifacts
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-unsigned-artifacts
          compression-level: 6
          if-no-files-found: error
          retention-days: 7
          path: |
            ${{ env.TOOLSCREEN_RELEASE_DIR }}/Toolscreen-not-legal-for-speedruns.dll
            ${{ env.TOOLSCREEN_RELEASE_DIR }}/Toolscreen-not-legal-for-speedruns.pdb
            ${{ env.TOOLSCREEN_RELEASE_DIR }}/liblogger_x64-not-legal-for-speedruns.dll
            ${{ env.TOOLSCREEN_RELEASE_DIR }}/Toolscreen-*-double-click-me-not-legal-for-speedruns.jar

      - name: Show sccache stats
        if: ${{ always() }}
        shell: pwsh
        run: sccache --show-stats
