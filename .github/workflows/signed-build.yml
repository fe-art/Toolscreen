name: Build Signed Release

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  build-signed-release:
    runs-on: windows-latest
    env:
      TOOLSCREEN_BUILD_DIR: 'out/build-ci'
      TOOLSCREEN_ARTIFACT_DIR: 'out/build-ci/bin/Release'
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: '0126c615-e5f1-4fed-a438-6b8de149c8f4'
      SIGNPATH_PROJECT_SLUG: 'Toolscreen'
      SIGNPATH_SIGNING_POLICY_SLUG: 'test-signing'
      SIGNPATH_DLL_ARTIFACT_CONFIGURATION_SLUG: 'dll'
      SIGNPATH_JAR_ARTIFACT_CONFIGURATION_SLUG: 'jar'
      SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG: 'installer'
      SIGNPATH_DOWNLOADER_ARTIFACT_CONFIGURATION_SLUG: 'downloader'
      VCPKG_DEFAULT_BINARY_CACHE: '${{ github.workspace }}/.cache/vcpkg/archives'
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/.cache/vcpkg/archives,readwrite'
      VCPKG_DISABLE_METRICS: '1'
      SCCACHE_GHA_ENABLED: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Validate signing configuration
        shell: pwsh
        run: |
          if (-not $env:SIGNPATH_API_TOKEN) {
            throw 'Missing SIGNPATH_API_TOKEN secret for the signed release workflow.'
          }

      - name: Resolve SignPath artifact version
        id: signpath_version
        shell: pwsh
        run: |
          $versionFile = Join-Path $env:GITHUB_WORKSPACE 'ToolscreenVersion.cmake'
          $versionContent = Get-Content $versionFile -Raw

          $majorMatch = [regex]::Match($versionContent, 'set\(TOOLSCREEN_VERSION_MAJOR\s+(\d+)\)')
          $minorMatch = [regex]::Match($versionContent, 'set\(TOOLSCREEN_VERSION_MINOR\s+(\d+)\)')
          $patchMatch = [regex]::Match($versionContent, 'set\(TOOLSCREEN_VERSION_PATCH\s+(\d+)\)')

          if (-not $majorMatch.Success -or -not $minorMatch.Success -or -not $patchMatch.Success) {
            throw "Failed to parse version from $versionFile"
          }

          $version = '{0}.{1}.{2}' -f $majorMatch.Groups[1].Value, $minorMatch.Groups[1].Value, $patchMatch.Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve signed release metadata
        id: release_meta
        shell: pwsh
        run: |
          $version = '${{ steps.signpath_version.outputs.version }}'
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $tag = "signed-v$version-run-$env:GITHUB_RUN_NUMBER-$shortSha"
          $title = "Signed Toolscreen $version ($shortSha)"

          "short_sha=$shortSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "title=$title" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore CMake dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TOOLSCREEN_BUILD_DIR }}/_deps
            ${{ env.TOOLSCREEN_BUILD_DIR }}/downloads
          key: windows-build-deps-v2-full-${{ hashFiles('CMakeLists.txt', 'src/vcpkg.json') }}
          restore-keys: |
            windows-build-deps-v2-full-

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: windows-vcpkg-binary-v1-${{ hashFiles('src/vcpkg.json') }}
          restore-keys: |
            windows-vcpkg-binary-v1-

      - name: Restore Maven repository cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: windows-maven-v2-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            windows-maven-v2-

      - name: Restore prebuilt liblogger cache
        id: prebuilt_liblogger_cache
        uses: actions/cache@v4
        with:
          path: out/prebuilt-liblogger
          key: windows-prebuilt-liblogger-v1-${{ hashFiles('liblogger/LibLoggerVersion.cmake', 'scripts/fetch_signed_liblogger.ps1') }}
          restore-keys: |
            windows-prebuilt-liblogger-v1-

      - name: Fetch latest signed liblogger artifacts
        if: ${{ steps.prebuilt_liblogger_cache.outputs.cache-hit != 'true' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $destination = Join-Path (Get-Location) 'out/prebuilt-liblogger'
          & .\scripts\fetch_signed_liblogger.ps1 -DestinationDirectory $destination

      - name: Configure build preset
        shell: pwsh
        run: |
          $prebuiltLoggerDllPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.dll').Path
          $prebuiltLoggerPdbPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.pdb').Path
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $signedDllPath = Join-Path $artifactDir 'Toolscreen.signed-package-input.dll'

          cmake --preset ci-ninja-x64 -DTOOLSCREEN_PACKAGING_DLL_PATH="$signedDllPath" -DTOOLSCREEN_PREBUILT_LIBLOGGER_DLL_PATH="$prebuiltLoggerDllPath" -DTOOLSCREEN_PREBUILT_LIBLOGGER_PDB_PATH="$prebuiltLoggerPdbPath"

      - name: Build unsigned DLLs and CLI integration test runner
        shell: pwsh
        run: cmake --build --preset ci-release --parallel --target Toolscreen toolscreen_gui_integration_tests

      - name: Run CLI integration tests
        shell: pwsh
        run: & "$env:GITHUB_WORKSPACE\$env:TOOLSCREEN_ARTIFACT_DIR\toolscreen_gui_integration_tests.exe" --run-all

      - name: Upload DLL for SignPath
        id: signpath_dll_upload
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-signpath-dll-input
          compression-level: 6
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/Toolscreen.dll

      - name: Submit DLL to SignPath with origin verification
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_DLL_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.signpath_dll_upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: out/signpath-dll-output
          parameters: |
            version: ${{ toJSON(steps.signpath_version.outputs.version) }}

      - name: Preserve signed DLL for packaging
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $artifactDllPath = Join-Path $artifactDir 'Toolscreen.dll'
          $signedDllPath = Join-Path $artifactDir 'Toolscreen.signed-package-input.dll'
          $downloadedSignedDllPath = 'out/signpath-dll-output/Toolscreen.dll'

          if (-not (Test-Path $artifactDllPath)) {
            throw "Expected unsigned DLL not found: $artifactDllPath"
          }

          if (-not (Test-Path $downloadedSignedDllPath)) {
            throw "Expected signed DLL download not found: $downloadedSignedDllPath"
          }

          if (Test-Path $signedDllPath) {
            Remove-Item -Path $signedDllPath -Force
          }

          Copy-Item -Path $downloadedSignedDllPath -Destination $signedDllPath -Force
          Copy-Item -Path $downloadedSignedDllPath -Destination $artifactDllPath -Force

      - name: Prepare EXE packaging inputs
        shell: pwsh
        run: cmake --build --preset ci-release --parallel --target toolscreen_prepare_easyinject_exe_inputs

      - name: Reconfigure packaging preset
        shell: pwsh
        run: |
          $prebuiltLoggerDllPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.dll').Path
          $prebuiltLoggerPdbPath = (Resolve-Path 'out/prebuilt-liblogger/liblogger_x64.pdb').Path
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $signedDllPath = (Resolve-Path (Join-Path $artifactDir 'Toolscreen.signed-package-input.dll')).Path

          cmake --preset ci-ninja-x64 -DTOOLSCREEN_PACKAGING_DLL_PATH="$signedDllPath" -DTOOLSCREEN_PREBUILT_LIBLOGGER_DLL_PATH="$prebuiltLoggerDllPath" -DTOOLSCREEN_PREBUILT_LIBLOGGER_PDB_PATH="$prebuiltLoggerPdbPath"

      - name: Remove stale packaged artifacts
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $patterns = @(
            'Toolscreen-*-double-click-me.jar'
            'Toolscreen-*-double-click-me.exe'
            'toolscreen-downloader.jar'
            'toolscreen-downloader.exe'
            'tioolscrteen-downloader.jar'
            'tioolscrteen-downloader.exe'
          )

          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $outputDir -File -Filter $pattern -ErrorAction SilentlyContinue | Remove-Item -Force
          }

      - name: Build installer EXE package
        shell: pwsh
        run: cmake --build --preset ci-release --parallel --target installer_exe

      - name: Build downloader EXE package
        shell: pwsh
        run: cmake --build --preset ci-release --parallel --target downloader_exe

      - name: Build JAR package
        shell: pwsh
        run: cmake --build --preset ci-release --parallel --target jar

      - name: Validate PE metadata for SignPath
        shell: pwsh
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE 'scripts\verify_pe_metadata.ps1'
          $artifactDirectory = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          & $scriptPath -ArtifactDirectory $artifactDirectory

      - name: Run CTest packaging smoke tests
        shell: pwsh
        run: ctest --preset ci-release --exclude-regex "^toolscreen_integration_"

      - name: Upload main installer JAR for SignPath
        id: signpath_jar_upload
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-signpath-main-installer-jar-input
          compression-level: 6
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/Toolscreen-*-double-click-me.jar

      - name: Submit main installer JAR to SignPath with origin verification
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_JAR_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.signpath_jar_upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: out/signpath-jar-output
          parameters: |
            version: ${{ toJSON(steps.signpath_version.outputs.version) }}

      - name: Replace main installer JAR with origin-verified signed output
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $jarMatches = Get-ChildItem $artifactDir -File -Filter 'Toolscreen-*-double-click-me.jar'
          $signedJarMatches = Get-ChildItem 'out/signpath-jar-output' -File -Filter 'Toolscreen-*-double-click-me.jar'

          if ($jarMatches.Count -ne 1) {
            throw "Expected exactly one unsigned main installer JAR, found $($jarMatches.Count)"
          }

          if ($signedJarMatches.Count -ne 1) {
            throw "Expected exactly one signed main installer JAR, found $($signedJarMatches.Count)"
          }

          Copy-Item -Path $signedJarMatches[0].FullName -Destination $jarMatches[0].FullName -Force

      - name: Upload installer EXE for SignPath
        id: signpath_installer_upload
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-signpath-installer-exe-input
          compression-level: 6
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/Toolscreen-*-double-click-me.exe

      - name: Submit installer EXE to SignPath with origin verification
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_INSTALLER_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.signpath_installer_upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: out/signpath-installer-exe-output
          parameters: |
            version: ${{ toJSON(steps.signpath_version.outputs.version) }}

      - name: Replace installer EXE with origin-verified signed output
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $installerMatches = Get-ChildItem $artifactDir -File -Filter 'Toolscreen-*-double-click-me.exe'
          $signedInstallerMatches = Get-ChildItem 'out/signpath-installer-exe-output' -File -Filter 'Toolscreen-*-double-click-me.exe'

          if ($installerMatches.Count -ne 1) {
            throw "Expected exactly one unsigned installer EXE, found $($installerMatches.Count)"
          }

          if ($signedInstallerMatches.Count -ne 1) {
            throw "Expected exactly one signed installer EXE, found $($signedInstallerMatches.Count)"
          }

          Copy-Item -Path $signedInstallerMatches[0].FullName -Destination $installerMatches[0].FullName -Force

      - name: Upload downloader EXE for SignPath
        id: signpath_downloader_upload
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-signpath-downloader-exe-input
          compression-level: 6
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/toolscreen-downloader.exe

      - name: Submit downloader EXE to SignPath with origin verification
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_DOWNLOADER_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.signpath_downloader_upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: out/signpath-downloader-exe-output
          parameters: |
            version: ${{ toJSON(steps.signpath_version.outputs.version) }}

      - name: Replace downloader EXE with origin-verified signed output
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $downloaderPath = Join-Path $artifactDir 'toolscreen-downloader.exe'
          $signedDownloaderPath = 'out/signpath-downloader-exe-output/toolscreen-downloader.exe'

          if (-not (Test-Path $downloaderPath)) {
            throw "Expected unsigned downloader EXE not found: $downloaderPath"
          }

          if (-not (Test-Path $signedDownloaderPath)) {
            throw "Expected signed downloader EXE not found: $signedDownloaderPath"
          }

          Copy-Item -Path $signedDownloaderPath -Destination $downloaderPath -Force

      - name: Restore signed DLL to release output
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $signedDllPath = Join-Path $artifactDir 'Toolscreen.signed-package-input.dll'
          $artifactDllPath = Join-Path $artifactDir 'Toolscreen.dll'

          if (-not (Test-Path $signedDllPath)) {
            throw "Expected preserved signed DLL not found: $signedDllPath"
          }

          Copy-Item -Path $signedDllPath -Destination $artifactDllPath -Force

      - name: Rename release artifacts
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR
          $suffix = '-not-legal-for-speedruns'

          function Get-SingleArtifactPath {
            param(
              [string]$Pattern,
              [string]$Label
            )

            $matches = Get-ChildItem $outputDir -File -Filter $Pattern

            if ($matches.Count -ne 1) {
              throw "Expected exactly one $Label matching '$Pattern' in $outputDir, found $($matches.Count)"
            }

            return $matches[0].FullName
          }

          $filesToRename = @(
            Join-Path $outputDir 'Toolscreen.dll'
            Join-Path $outputDir 'Toolscreen.pdb'
            Join-Path $outputDir 'liblogger_x64.dll'
            Join-Path $outputDir 'liblogger_x64.pdb'
            Get-SingleArtifactPath 'Toolscreen-*-double-click-me.jar' 'main installer jar'
            Get-SingleArtifactPath 'Toolscreen-*-double-click-me.exe' 'main installer exe'
            Join-Path $outputDir 'toolscreen-downloader.jar'
            Join-Path $outputDir 'toolscreen-downloader.exe'
          )

          foreach ($filePath in $filesToRename) {
            if (-not (Test-Path $filePath)) {
              throw "Expected artifact not found: $filePath"
            }

            $item = Get-Item $filePath
            $renamed = '{0}{1}{2}' -f $item.BaseName, $suffix, $item.Extension
            Move-Item -Path $item.FullName -Destination (Join-Path $item.DirectoryName $renamed)
          }

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-signed-release-artifacts
          compression-level: 6
          if-no-files-found: error
          retention-days: 14
          path: |
            ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/Toolscreen-not-legal-for-speedruns.dll
            ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/Toolscreen-not-legal-for-speedruns.pdb
            ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/liblogger_x64-not-legal-for-speedruns.dll
            ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/liblogger_x64-not-legal-for-speedruns.pdb
            ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/Toolscreen-*-double-click-me-not-legal-for-speedruns.jar
            ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/Toolscreen-*-double-click-me-not-legal-for-speedruns.exe
            ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/toolscreen-downloader-not-legal-for-speedruns.jar
            ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/toolscreen-downloader-not-legal-for-speedruns.exe

      - name: Upload final signed JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolscreen-final-signed-jar
          compression-level: 6
          if-no-files-found: error
          retention-days: 14
          path: ${{ env.TOOLSCREEN_ARTIFACT_DIR }}/Toolscreen-*-double-click-me-not-legal-for-speedruns.jar

      - name: Publish signed artifacts to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $tag = '${{ steps.release_meta.outputs.tag }}'
          $title = '${{ steps.release_meta.outputs.title }}'
          $notesPath = Join-Path $env:RUNNER_TEMP 'signed-release-notes.md'
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE $env:TOOLSCREEN_ARTIFACT_DIR

          @"
          Signed Toolscreen archive.

          Version: ${{ steps.signpath_version.outputs.version }}
          Commit: ${{ github.sha }}
          Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          These assets were produced by the manual Build Signed Release workflow and passed through the SignPath trusted-build signing flow.
          "@ | Set-Content -Path $notesPath -Encoding utf8

          gh release view $tag -R $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag -R $repo --title $title --notes-file $notesPath --prerelease
          } else {
            gh release create $tag -R $repo --title $title --notes-file $notesPath --prerelease --target $env:GITHUB_SHA
          }

          $assets = @(
            (Join-Path $artifactDir 'Toolscreen-not-legal-for-speedruns.dll'),
            (Join-Path $artifactDir 'Toolscreen-not-legal-for-speedruns.pdb'),
            (Join-Path $artifactDir 'liblogger_x64-not-legal-for-speedruns.dll'),
            (Join-Path $artifactDir 'liblogger_x64-not-legal-for-speedruns.pdb')
          )

          $assets += (Get-ChildItem $artifactDir -File -Filter 'Toolscreen-*-double-click-me-not-legal-for-speedruns.jar').FullName
          $assets += (Get-ChildItem $artifactDir -File -Filter 'Toolscreen-*-double-click-me-not-legal-for-speedruns.exe').FullName
          $assets += @(
            (Join-Path $artifactDir 'toolscreen-downloader-not-legal-for-speedruns.jar'),
            (Join-Path $artifactDir 'toolscreen-downloader-not-legal-for-speedruns.exe')
          )

          gh release upload $tag -R $repo --clobber $assets

      - name: Show sccache stats
        if: ${{ always() }}
        shell: pwsh
        run: sccache --show-stats